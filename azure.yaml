# Azure Developer CLI (azd) configuration
# Deploy with: azd up

name: ai-workflow-authoring

metadata:
  template: ai-workflow-authoring@0.1.0

# Azure resources to provision
infra:
  provider: bicep
  path: infra
  module: main

# Services to deploy
services:
  app:
    project: .
    language: python
    host: containerapp
    docker:
      path: ./Dockerfile
      registry: ${AZURE_CONTAINER_REGISTRY_ENDPOINT}
